name: seoul_land_app
description: 서울랜드 앱 - 맞춤 추천, 지도, 아카이브
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  http: 1.5.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  firebase_core: ^3.9.0
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
